name: build-and-deploy

on:
  schedule:
    - cron: "0 * * * *" # hourly — sheet edits go live within the hour
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write # commit geocode cache updates
  pages: write
  id-token: write

concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests pillow

      - name: Contract regression tests
        run: python -m unittest discover -s build/tests

      - name: Build data from sheet
        env:
          SHEET_CSV_URL: ${{ vars.SHEET_CSV_URL }}
        run: |
          if [ -z "$SHEET_CSV_URL" ]; then
            echo "SHEET_CSV_URL repository variable is not set (Settings → Secrets and variables → Actions → Variables)" >&2
            exit 1
          fi
          python build/build.py "$SHEET_CSV_URL"

      - name: Commit geocode/photo caches if changed
        run: |
          git add data/geocode_cache.json data/photo_cache.json widget/public/photos
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update geocode/photo caches [skip ci]"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - run: npm ci
        working-directory: widget

      - run: npm run build
        working-directory: widget

      - uses: actions/upload-pages-artifact@v3
        with:
          path: widget/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
